server:
  port: 7788
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,pf4bootplugins,pf4bootgovernance
spring:
  mvc:
    static-path-pattern: /**
  pf4boot:
    runtime-mode: deployment
    enabled: true
    plugins-root: samples/app-template-basic/host/build/template-plugins
    system-version: 1.0.0
    plugin-package-verification-mode: WARN
    plugin-compatibility-verification-mode: WARN
    plugin-compatibility-precheck-mode: WARN
    plugin-compatibility-pf4boot-version: 3.3.0
    plugin-compatibility-pf4boot-plugin-version: 1.7.0
    plugin-compatibility-spring-boot-version: 2.7.22
    plugin-compatibility-pf4j-version: 3.15.0
    plugin-compatibility-jdk-version: 1.8
    plugin-compatibility-package-format-version: 1
    classes-directories:
      - "build/classes/java/main"
      - "build/resources/main"
    lib-directories:
      - "lib"
      - "build/inline"
    management:
      http:
        enabled: true
        mode: LOCAL_TOKEN
        token: ${PF4BOOT_ADMIN_TOKEN:sample-token}
        allow-loopback-only: true
        staging-root: samples/app-template-basic/host/build/template-plugins
        operation-store:
          type: memory

