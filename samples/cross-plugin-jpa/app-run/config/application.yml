server:
  port: 7791
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,pf4bootplugins,pf4bootgovernance,pf4bootjpareload
spring:
  mvc:
    static-path-pattern: /**
  flyway:
    enabled: false
  pf4boot:
    runtime-mode: deployment
    enabled: true
    plugins-root: plugins
    system-version: 1.0.0
    plugin-package-verification-mode: WARN
    plugin-compatibility-verification-mode: WARN
    management:
      http:
        enabled: true
        mode: LOCAL_TOKEN
        token: ${PF4BOOT_ADMIN_TOKEN:sample-token}
        staging-root: plugins
        operation-store:
          type: memory
    main:
      allow-bean-definition-overriding: true
  jpa:
    open-in-view: false
    show_sql: true
    format_sql: true
pf4boot:
  plugin:
    jpa:
      enabled: true
      mode: SHARED
      domain-id: demo
      domain-reload:
        mode: STOP_CONSUMERS_AND_REBUILD
        record-store:
          type: file
          directory: work/pf4boot/jpa-reloads
      domain:
        id: demo
        entity-packages:
          - net.xdob.sample.model.userbook
          - net.xdob.sample.model.audit
        datasource:
          url: jdbc:h2:file:~/h2/pf4boot_sample_cross_plugin_jpa;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
          username: sa
          password:
          driver-class-name: org.h2.Driver
        ddl-auto: update
