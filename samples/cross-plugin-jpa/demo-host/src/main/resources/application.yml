server:
  port: 7791
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,pf4bootplugins,pf4bootgovernance,pf4bootjpareload
spring:
  mvc:
    static-path-pattern: /**
  flyway:
    enabled: false
  pf4boot:
    runtime-mode: deployment
    enabled: true
    plugins-root: samples/cross-plugin-jpa/demo-host/build/sample-plugins
    system-version: 1.0.0
    plugin-package-verification-mode: WARN
    plugin-compatibility-verification-mode: WARN
    classes-directories:
      - "build/classes/java/main"
      - "build/resources/main"
    lib-directories:
      - "lib"
      - "build/inline"
    main:
      allow-bean-definition-overriding: true
    management:
      http:
        enabled: true
        mode: LOCAL_TOKEN
        token: ${PF4BOOT_ADMIN_TOKEN:sample-token}
        allow-loopback-only: false
        staging-root: build/sample-plugins
        operation-store:
          type: memory
    jpa:
      reload:
        mode: STOP_CONSUMERS_AND_REBUILD
        record-store:
          type: file
          directory: build/pf4boot/jpa-reloads
  jpa:
    open-in-view: false
    show_sql: true
    format_sql: true
