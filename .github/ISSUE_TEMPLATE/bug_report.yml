name: Bug report
description: Report a reproducible pf4boot bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve pf4boot. For security vulnerabilities, do not use this form; follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest steps or sample project that reproduces the issue.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include relevant logs, stack traces, HTTP responses, or Gradle output.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pf4boot version or commit
      placeholder: 3.3.0-SNAPSHOT / commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Core plugin loading
        - Spring Boot starter
        - Web support
        - JPA support
        - Management API
        - Plugin packaging
        - Repository / trust / release gates
        - Samples / documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Java, Gradle, Spring Boot, OS, database, and runtime mode.
      placeholder: |
        Java:
        Gradle:
        Spring Boot:
        OS:
        Runtime mode:
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification commands
      description: Commands you ran while reproducing or narrowing the issue.
      placeholder: .\gradlew.bat :pf4boot-core:test

